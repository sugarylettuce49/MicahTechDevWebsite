<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Download Toy Town Mayhem for Android</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; display:flex; height:100vh;
           align-items:center; justify-content:center; flex-direction:column; gap:12px; }
    .btn { padding:10px 16px; border-radius:8px; border:1px solid #ccc; cursor:pointer; background:#f5f5f5; }
    .hint { font-size:0.9rem; color:#666; max-width:40ch; text-align:center; }
  </style>
</head>
<body>
  <center>
  <div>
    <div class="hint">Preparing download... if nothing happens, click the button below.</div>
    <br>
    <br>
    <br>
    <button id="manual" class="btn" style="display:none">Download APK</button>
  </div>
  </center>

<script>
(async function() {
  const url = "https://github.com/MXFPS/MXFPS.github.io/releases/download/v1.6.1/ToyTownMayhem.apk";
  const suggestedFilename = "ToyTownMayhem.apk";
  const manualBtn = document.getElementById('manual');

  // helper to force-download by creating an <a download> and clicking it
  function triggerLinkDownload(href, filename) {
    const a = document.createElement('a');
    a.href = href;
    a.download = filename || "";
    // For some browsers a must be in document to click
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  // Try to fetch the file as a blob (works if server allows CORS).
  try {
    const resp = await fetch(url, { mode: 'cors' });
    if (!resp.ok) throw new Error('Network response was not ok: ' + resp.status);
    const blob = await resp.blob();
    const blobUrl = URL.createObjectURL(blob);

    // trigger download using blob URL so we can set filename
    triggerLinkDownload(blobUrl, suggestedFilename);

    // clean up blob URL shortly after
    setTimeout(() => URL.revokeObjectURL(blobUrl), 60_000);
  } catch (err) {
    // Common: GitHub releases often don't allow cross-origin fetch from arbitrary pages -> fallback.
    console.warn('Fetch failed or blocked by CORS — falling back to direct link:', err);
    // Show manual button in case automatic click fails or is blocked.
    manualBtn.style.display = 'inline-block';
    manualBtn.onclick = () => {
      // clicking a straight link; browser will navigate or download depending on headers and browser behavior
      triggerLinkDownload(url, suggestedFilename);
    };

    // Also attempt to auto-click a direct <a> (may navigate away or trigger download)
    try {
      triggerLinkDownload(url, suggestedFilename);
    } catch (e) {
      console.error('Fallback auto-click failed:', e);
    }
  }
})();
</script>
</body>
</html>
